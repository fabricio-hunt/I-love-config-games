<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TechKid — Fase 5: Conversa Tecnológica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #C3B1E1;
      --primary-dark: #9B81C9;
      --primary-light: #E8DFF5;
      --green: #52C41A;
      --green-bg: #F0F9E6;
      --red: #FF4444;
      --red-bg: #FFF0F0;
      --text: #2D2D2D;
      --muted: #7A6B93;
      --radius: 26px;
      --radius-sm: 18px;
    }
    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(150deg, #F0EAFB 0%, #F9F6FF 35%, #EDE4FA 85%, #E2D8F5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .page {
      max-width: 560px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .back-btn, .phase-label, .progress-badge {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 17px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 5px 18px rgba(155,129,201,0.15);
      border: 2px solid rgba(195,177,225,0.35);
      text-decoration: none;
      font-weight: 800;
      color: var(--primary-dark);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(155,129,201,0.24); }
    .phase-label { background: var(--primary-dark); color: white; border-color: transparent; }
    .progress-badge { color: var(--muted); cursor: default; }

    .title-area { text-align: center; }
    h1 { font-size: clamp(1.3rem, 4vw, 1.75rem); font-weight: 900; color: var(--primary-dark); }
    .subtitle { margin-top: 4px; font-weight: 800; color: var(--muted); font-size: 0.9rem; }

    .game-card {
      background: white;
      border-radius: var(--radius);
      padding: 22px 18px;
      box-shadow: 0 12px 42px rgba(155,129,201,0.14);
      border: 2px solid rgba(195,177,225,0.28);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .scene {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .robo-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(155,129,201,0.2);
    }
    .balao {
      background: #F5F0FD;
      border-radius: 0 var(--radius-sm) var(--radius-sm) var(--radius-sm);
      padding: 14px 18px;
      font-weight: 800;
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--text);
      box-shadow: 0 3px 12px rgba(155,129,201,0.08);
      flex: 1;
      border: 2px solid rgba(195,177,225,0.2);
      transition: background 0.3s, border-color 0.3s;
    }
    .balao.correct { background: var(--green-bg); border-color: var(--green); }
    .balao.wrong { background: var(--red-bg); border-color: var(--red); }

    .quiz-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quiz-label {
      font-weight: 900;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }
    .options-grid {
      display: grid;
      gap: 10px;
    }
    .option-btn {
      min-height: 54px;
      border: 3px solid var(--primary-light);
      border-radius: var(--radius-sm);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      padding: 10px 14px;
      text-align: left;
      box-shadow: 0 3px 12px rgba(155,129,201,0.06);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
    }
    .option-btn:hover, .option-btn:focus-visible { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(155,129,201,0.14); border-color: var(--primary-dark); outline: none; }
    .option-btn:active { transform: scale(0.97); }
    .option-btn.correct { background: var(--green-bg); border-color: var(--green); color: #2B5E0F; }
    .option-btn.wrong { background: var(--red-bg); border-color: var(--red); }

    .progress-row {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid #D4C9E8;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 900;
      transition: 0.3s;
    }
    .dot.done { background: var(--green); border-color: var(--green); color: white; }
    .dot.current { border-color: var(--primary-dark); box-shadow: 0 0 0 5px rgba(195,177,225,0.3); }

    .status-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
    }
    .reset-link {
      background: none;
      border: none;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--primary-dark);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .star-counter { display: flex; gap: 3px; }
    .star-counter .star { font-size: 1.15rem; opacity: 0.3; transform: scale(0.75); transition: 0.35s; }
    .star-counter .star.earned { opacity: 1; transform: scale(1.15); }

    .balao.shake { animation: shakeRed 0.45s ease; }
    @keyframes shakeRed {
      0%,100% { transform: translateX(0); }
      15%  { transform: translateX(-8px) rotate(-1.5deg); }
      30%  { transform: translateX(8px) rotate(1.5deg); }
      45%  { transform: translateX(-6px) rotate(-1deg); }
      60%  { transform: translateX(6px) rotate(1deg); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
    }

    .fireworks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .victory-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,33,0.48);
      backdrop-filter: blur(4px);
      z-index: 800;
      padding: 18px;
    }
    .victory-overlay.show { display: flex; animation: fadeIn 0.25s ease both; }

    .victory-card {
      width: min(92vw, 440px);
      background: white;
      border-radius: 34px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,0.25);
      border: 4px solid var(--primary);
      animation: popIn 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .victory-emoji { display: block; font-size: 4rem; margin-bottom: 8px; }
    .victory-title { font-size: 2rem; font-weight: 900; color: var(--primary-dark); }
    .victory-subtitle { margin: 8px 0 16px; font-weight: 800; color: var(--muted); }
    .stars-display { display: flex; justify-content: center; gap: 8px; margin: 10px 0 20px; }
    .star-big { font-size: 2.4rem; filter: grayscale(1); opacity: 0.34; transform: scale(0.7); transition: 0.35s ease; }
    .star-big.earned { filter: none; opacity: 1; transform: scale(1.1); }

    .victory-btns { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .btn {
      min-height: 48px;
      border-radius: 999px;
      border: 0;
      padding: 11px 18px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
    }
    .btn-primary { background: var(--primary-dark); color: white; }
    .btn-secondary { background: var(--primary-light); color: var(--primary-dark); }

    @keyframes spark-fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }
    @keyframes popIn { 0% { transform: scale(0.65) rotate(-4deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 420px) {
      body { padding: 10px; }
      .game-card { padding: 16px; }
      .robo-avatar { width: 46px; height: 46px; font-size: 1.8rem; }
      .option-btn { font-size: 0.84rem; min-height: 50px; }
    }
  </style>
</head>
<body>
  <div class="fireworks" id="fireworks"></div>

  <main class="page">
    <header class="top-bar">
      <a class="back-btn" href="../index.html">← Menu</a>
      <div class="phase-label">Fase 5 · IA</div>
      <div class="progress-badge"><span id="stepText">1/6</span> perguntas</div>
    </header>

    <section class="title-area">
      <h1>Converse com o robô!</h1>
      <p class="subtitle">Escolha a resposta certa para cada pergunta do TechKid.</p>
    </section>

    <div class="game-card">
      <div class="scene" aria-live="polite">
        <div class="robo-avatar" id="roboFace">🤖</div>
        <div class="balao" id="balao">Carregando...</div>
      </div>

      <div class="quiz-area">
        <div class="quiz-label" id="quizLabel">Qual é a melhor resposta?</div>
        <div class="options-grid" id="optionsGrid"></div>
      </div>

      <div class="progress-row" id="dotsRow"></div>

      <div class="status-footer">
        <div class="star-counter">
          <span class="star" id="starLive1">⭐</span>
          <span class="star" id="starLive2">⭐</span>
          <span class="star" id="starLive3">⭐</span>
        </div>
        <button class="reset-link" id="resetBtn" type="button">↻ Recomeçar</button>
      </div>
    </div>
  </main>

  <div class="victory-overlay" id="victoryOverlay">
    <div class="victory-card">
      <span class="victory-emoji">🎉</span>
      <div class="victory-title">Parabéns!</div>
      <div class="victory-subtitle" id="victorySubtitle">Você ajudou o robô!</div>
      <div class="stars-display">
        <span class="star-big" id="starBig1">⭐</span>
        <span class="star-big" id="starBig2">⭐</span>
        <span class="star-big" id="starBig3">⭐</span>
      </div>
      <div class="victory-btns">
        <button class="btn btn-secondary" id="btnReplay" type="button">🔄 Jogar de novo</button>
        <a href="../index.html" class="btn btn-primary">🏠 Menu</a>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      {
        balloon: 'Oi amiguinho! 😊 Eu sou o robô TechKid! O que é um **computador**?',
        correctIndex: 0,
        options: [
          'Uma máquina que ajuda a gente a pensar, criar e aprender.',
          'Um bicho que vive na tomada.',
          'Um brinquedo que só faz barulho.'
        ],
        correctReply: 'Isso mesmo! 🌟 Um computador é uma máquina mágica que nos ajuda a aprender, desenhar, escrever e até jogar!'
      },
      {
        balloon: 'Muito bem! 🙌 E me diz: como a **internet** funciona?',
        correctIndex: 1,
        options: [
          'É um fio mágico que passa dentro da terra.',
          'É como uma grande teia de informações que conecta computadores do mundo todo.',
          'É um satélite que joga letras no céu.'
        ],
        correctReply: 'Exato! 🌐 A internet é como uma teia gigante que conecta pessoas e computadores no mundo inteiro!'
      },
      {
        balloon: 'Você é demais! 🤩 Agora me fala: o que é um **robô**?',
        correctIndex: 2,
        options: [
          'Uma pessoa que usa fantasia de metal.',
          'Um animal robótico que late.',
          'Uma máquina programada para fazer tarefas, como brinquedo controlado.'
        ],
        correctReply: 'Perfeito! 🤖 Um robô é como um ajudante eletrônico que segue comandos para fazer tarefas!'
      },
      {
        balloon: 'Ótima resposta! 💡 Pra que serve um **celular**?',
        correctIndex: 0,
        options: [
          'Para conversar, tirar fotos, aprender e se divertir.',
          'Só para jogar videogame.',
          'Só para assistir desenho.'
        ],
        correctReply: 'Isso! 📱 O celular serve para muitas coisas legais: conversar, aprender e até jogar!'
      },
      {
        balloon: 'Você sabe tudo! 🧩 O que é um **aplicativo**?',
        correctIndex: 1,
        options: [
          'Um tipo de comida diferente.',
          'É um programa que faz uma tarefa especial, como desenhar ou jogar.',
          'É uma chave para abrir portas.'
        ],
        correctReply: 'Mandou bem! ⚡ Cada app faz uma coisa diferente: tem app de desenhar, de jogo, de foto e muito mais!'
      },
      {
        balloon: 'Última pergunta! 🌈 O que significa ser um **programador**?',
        correctIndex: 2,
        options: [
          'Alguém que arruma televisão.',
          'Alguém que só joga no computador o dia todo.',
          'Alguém que cria jogos e apps usando códigos, como dar instruções para o computador.'
        ],
        correctReply: 'Incrível! 👩‍💻 Programar é como dar instruções para o computador fazer coisas mágicas!'
      }
    ];

    const TOTAL = QUESTIONS.length;
    let step = 0;
    let errors = 0;
    let answered = false;
    let audioCtx = null;

    const balao = document.getElementById('balao');
    const roboFace = document.getElementById('roboFace');
    const optionsGrid = document.getElementById('optionsGrid');
    const quizLabel = document.getElementById('quizLabel');
    const dotsRow = document.getElementById('dotsRow');
    const stepText = document.getElementById('stepText');
    const resetBtn = document.getElementById('resetBtn');
    const btnReplay = document.getElementById('btnReplay');

    function init() {
      renderDots();
      renderQuestion();
      resetBtn.addEventListener('click', resetGame);
      btnReplay.addEventListener('click', () => window.location.reload());
    }

    function renderDots() {
      dotsRow.innerHTML = '';
      for (let i = 0; i < TOTAL; i++) {
        const dot = document.createElement('span');
        dot.className = 'dot' + (i < step ? ' done' : '') + (i === step && step < TOTAL ? ' current' : '');
        dot.textContent = i < step ? '✓' : (i + 1);
        dotsRow.appendChild(dot);
      }
      stepText.textContent = (step + (step >= TOTAL ? 0 : 0)) + '/' + TOTAL;
      updateStepDisplay();
    }

    function updateStepDisplay() {
      const current = Math.min(step + 1, TOTAL);
      stepText.textContent = (step < TOTAL ? step + 1 : step) + '/' + TOTAL;
    }

    function renderQuestion() {
      if (step >= TOTAL) {
        triggerVictory();
        return;
      }

      const q = QUESTIONS[step];
      answered = false;
      balao.className = 'balao';
      balao.textContent = q.balloon.replace(/\*\*/g, '');
      roboFace.textContent = '🤖';
      quizLabel.textContent = 'Qual é a melhor resposta?';
      renderDots();

      optionsGrid.innerHTML = q.options.map((opt, i) => `
        <button class="option-btn" type="button" data-index="${i}">${opt}</button>
      `).join('');

      optionsGrid.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => pickAnswer(Number(btn.dataset.index)));
      });
    }

    function pickAnswer(index) {
      if (answered) return;
      answered = true;
      unlockAudio();

      const q = QUESTIONS[step];
      const correct = index === q.correctIndex;

      const buttons = optionsGrid.querySelectorAll('.option-btn');
      buttons.forEach((btn, i) => {
        if (i === q.correctIndex) btn.classList.add('correct');
        else if (i === index && !correct) btn.classList.add('wrong');
        btn.disabled = true;
        btn.style.pointerEvents = 'none';
      });

      if (correct) {
        playSound('correct');
        balao.className = 'balao correct';
        balao.textContent = q.correctReply;
        roboFace.textContent = '😄';
        quizLabel.textContent = 'Muito bem! Resposta certa! ✅';
      } else {
        errors++;
        playSound('wrong');
        balao.className = 'balao wrong shake';
        balao.textContent = 'Ops! Não foi essa... Mas tudo bem! A resposta certa é esta aqui embaixo.';
        roboFace.textContent = '😅';
        quizLabel.textContent = 'Não foi dessa vez! Veja a resposta correta.';
        updateLiveStars();
      }

      step++;
      setTimeout(() => {
        renderQuestion();
      }, 2200);
    }

    function calcStars() {
      if (errors === 0) return 3;
      if (errors <= 2) return 2;
      return 1;
    }

    function updateLiveStars() {
      const remaining = calcStarsForCurrent();
      for (let i = 1; i <= 3; i++) {
        const star = document.getElementById('starLive' + i);
        star.classList.toggle('earned', i <= remaining);
      }
    }

    function calcStarsForCurrent() {
      const err = errors;
      if (err === 0) return 3;
      if (err <= 2) return 2;
      return 1;
    }

    function triggerVictory() {
      const stars = calcStars();
      localStorage.setItem('phase5_done', 'true');
      localStorage.setItem('phase5_stars', String(stars));
      localStorage.removeItem('phase4_done'); // ensure phase4 is completed before this

      const messages = {
        3: 'Respostas perfeitas! Você é fera em tecnologia!',
        2: 'Muito bom! Você acertou quase todas!',
        1: 'Boa! Você aprendeu bastante com o robô!'
      };
      document.getElementById('victorySubtitle').textContent = messages[stars];

      playSound('victory');
      launchFireworksShow();

      roboFace.textContent = '🎊';
      balao.className = 'balao correct';
      balao.textContent = 'Uhuuul! Terminamos nossa conversa! Você é muito inteligente! 🎉';

      renderVictoryDots();

      setTimeout(() => {
        document.getElementById('victoryOverlay').classList.add('show');
        showBigStars(stars);
      }, 600);
    }

    function renderVictoryDots() {
      dotsRow.innerHTML = '';
      for (let i = 0; i < TOTAL; i++) {
        const dot = document.createElement('span');
        dot.className = 'dot done';
        dot.textContent = '✓';
        dotsRow.appendChild(dot);
      }
      stepText.textContent = TOTAL + '/' + TOTAL;
    }

    function showBigStars(stars) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('starBig' + i);
        el.classList.remove('earned');
        if (i <= stars) {
          setTimeout(() => {
            el.classList.add('earned');
            playSound('correct');
          }, i * 300);
        }
      }
    }

    function resetGame() {
      step = 0;
      errors = 0;
      answered = false;
      initLiveStars();
      renderDots();
      renderQuestion();
    }

    function initLiveStars() {
      for (let i = 1; i <= 3; i++) {
        document.getElementById('starLive' + i).classList.add('earned');
      }
    }

    function unlockAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
      if (!audioCtx) return;

      if (type === 'victory') {
        [523, 659, 784, 1047].forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = audioCtx.currentTime + i * 0.14;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.32, t + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
          osc.start(t);
          osc.stop(t + 0.42);
        });
        return;
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.08);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.16);
        gain.gain.setValueAtTime(0.22, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.32);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.34);
      } else {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.16, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.26);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.28);
      }
    }

    function launchFirework(x, y) {
      const colors = ['#FF6B6B', '#FFE66D', '#4ECDC4', '#A8E6CF', '#FF9FF3', '#C3B1E1', '#95D5B2'];
      const container = document.getElementById('fireworks');

      for (let i = 0; i < 18; i++) {
        const spark = document.createElement('div');
        const angle = (i / 18) * Math.PI * 2;
        const dist = 60 + Math.random() * 70;
        spark.style.cssText = `
          position:absolute;
          left:${x}px;
          top:${y}px;
          width:${5 + Math.random() * 7}px;
          height:${5 + Math.random() * 7}px;
          border-radius:50%;
          background:${colors[i % colors.length]};
          --dx:${Math.cos(angle) * dist}px;
          --dy:${Math.sin(angle) * dist}px;
          animation:spark-fly ${0.65 + Math.random() * 0.35}s ease-out forwards;
        `;
        container.appendChild(spark);
        setTimeout(() => spark.remove(), 1200);
      }
    }

    function launchFireworksShow() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      [[0.18,0.28],[0.78,0.22],[0.5,0.34],[0.28,0.58],[0.72,0.55],[0.5,0.72]].forEach(([x, y], i) => {
        setTimeout(() => launchFirework(W * x, H * y), i * 170);
      });
    }

    init();
    initLiveStars();
  </script>
</body>
</html>
