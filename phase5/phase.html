<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TechKid — Fase 5: Falar com a IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #C3B1E1;
      --primary-dark: #9B81C9;
      --primary-light: #E8DFF5;
      --bg: #F7F3FC;
      --card: #FFFFFF;
      --text: #2D2D2D;
      --text-muted: #7A6B93;
      --shadow: 0 8px 32px rgba(155,129,201,0.15);
      --radius: 24px;
      --radius-sm: 14px;
      --radius-pill: 50px;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #F0EAFB 0%, #F7F3FC 40%, #EDE4FA 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary-dark);
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(155,129,201,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(155,129,201,0.3); }
    .back-btn:active { transform: scale(0.96); }

    .header-info { text-align: center; margin-bottom: 12px; flex-shrink: 0; }
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border-radius: 50px;
      padding: 6px 18px;
      box-shadow: 0 3px 12px rgba(155,129,201,0.15);
    }
    .phase-badge .emoji { font-size: 1.4rem; }
    .phase-badge .label { font-size: 0.85rem; font-weight: 700; color: var(--primary-dark); }
    .msg-counter {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 4px;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 4px 16px;
      min-height: 0;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

    .message {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: slideUp 0.3s ease both;
    }
    .message.assistant { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .message.assistant .msg-avatar { background: var(--primary-light); }
    .message.user .msg-avatar { background: #FFE0E0; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    }
    .message.assistant .msg-bubble {
      background: white;
      border-top-left-radius: 6px;
      color: var(--text);
    }
    .message.user .msg-bubble {
      background: var(--primary);
      border-top-right-radius: 6px;
      color: #3A2560;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary-dark);
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .quick-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .quick-btn {
      background: white;
      border: 2px solid var(--primary-light);
      border-radius: 50px;
      padding: 10px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-dark);
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(155,129,201,0.08);
      flex: 1;
      min-width: 90px;
      text-align: center;
    }
    .quick-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary-dark);
      transform: translateY(-2px);
    }
    .quick-btn:active { transform: scale(0.96); }

    .input-area {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    .input-area input {
      flex: 1;
      border: 2px solid var(--primary-light);
      border-radius: 50px;
      padding: 12px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      box-shadow: 0 3px 10px rgba(155,129,201,0.08);
    }
    .input-area input:focus { border-color: var(--primary-dark); }
    .input-area input::placeholder { color: var(--text-muted); opacity: 0.5; }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary-dark);
      color: white;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(155,129,201,0.3);
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error-msg {
      text-align: center;
      color: #E05050;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 4px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
    }
    .empty-state .big-emoji { font-size: 4rem; display: block; margin-bottom: 12px; }
    .empty-state .title { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; color: var(--text); }
    .empty-state .sub { font-size: 0.9rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='../index.html'">← Menu</button>
    </div>

    <div class="header-info">
      <div class="phase-badge">
        <span class="emoji">🧠</span>
        <span class="label">Fase 5 · Falar com a IA</span>
      </div>
      <div class="msg-counter" id="msgCounter">0 de 10 mensagens</div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="empty-state">
        <span class="big-emoji">🤖</span>
        <div class="title">Converse com o Robô TechKid!</div>
        <div class="sub">Pergunte sobre tecnologia ou escolha uma pergunta abaixo</div>
      </div>
    </div>

    <div class="quick-btns" id="quickBtns">
      <button class="quick-btn" data-text="O que é um computador?">O que é um computador?</button>
      <button class="quick-btn" data-text="Como funciona a internet?">Como funciona a internet?</button>
      <button class="quick-btn" data-text="O que é um robô?">O que é um robô?</button>
    </div>

    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Digite sua pergunta..." maxlength="200" autocomplete="off">
      <button class="send-btn" id="sendBtn" title="Enviar">➤</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    const MAX_MESSAGES = 10;
    const chatArea = document.getElementById('chatArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const errorMsg = document.getElementById('errorMsg');
    const msgCounter = document.getElementById('msgCounter');
    const quickBtns = document.getElementById('quickBtns');

    let conversationHistory = [];
    let msgCount = 0;
    let isLoading = false;

    function updateCounter() {
      msgCounter.textContent = msgCount + ' de ' + MAX_MESSAGES + ' mensagens';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      setTimeout(() => { errorMsg.textContent = ''; }, 3000);
    }

    function isAtLimit() {
      return msgCount >= MAX_MESSAGES;
    }

    function addMessage(role, text) {
      const emptyState = chatArea.querySelector('.empty-state');
      if (emptyState) emptyState.remove();

      const div = document.createElement('div');
      div.className = 'message ' + role;

      const avatarEmoji = role === 'assistant' ? '🤖' : '👦';
      div.innerHTML = `
        <div class="msg-avatar">${avatarEmoji}</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
      `;

      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function sendMessage(text) {
      if (isLoading) return;
      if (isAtLimit()) {
        showError('Você já usou todas as 10 mensagens! Volte ao menu e tente de novo.');
        return;
      }
      if (!text.trim()) return;

      isLoading = true;
      sendBtn.disabled = true;
      msgInput.disabled = true;
      quickBtns.style.pointerEvents = 'none';
      quickBtns.style.opacity = '0.5';

      addMessage('user', text.trim());
      conversationHistory.push({ role: 'user', content: text.trim() });
      msgCount++;
      updateCounter();

      addTypingIndicator();

      try {
        const response = await fetch('/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: text.trim(),
            history: conversationHistory.slice(0, -1),
          }),
        });

        removeTypingIndicator();

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          showError(err.error || 'Erro ao falar com o robô. Tente de novo!');
          conversationHistory.pop();
          msgCount--;
          updateCounter();
        } else {
          const data = await response.json();
          const reply = data.text || 'Hmm, não entendi. Pode perguntar de novo? 🤔';
          addMessage('assistant', reply);
          conversationHistory.push({ role: 'assistant', content: reply });

          if (msgCount >= MAX_MESSAGES) {
            setTimeout(() => {
              showVictory();
            }, 1500);
          }
        }
      } catch (e) {
        removeTypingIndicator();
        showError('Não consegui falar com o robô. Verifique sua internet!');
        conversationHistory.pop();
        msgCount--;
        updateCounter();
      }

      isLoading = false;
      sendBtn.disabled = false;
      msgInput.disabled = false;
      quickBtns.style.pointerEvents = 'auto';
      quickBtns.style.opacity = '1';
      msgInput.value = '';
      msgInput.focus();
    }

    function showVictory() {
      localStorage.setItem('phase5_done', 'true');
      localStorage.setItem('phase5_stars', '3');

      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: fixed; inset: 0; background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center;
        z-index: 200; backdrop-filter: blur(5px);
      `;
      overlay.innerHTML = `
        <div style="
          background: white; border-radius: 32px; padding: 36px 32px;
          text-align: center; max-width: 340px; width: 90%;
          box-shadow: 0 24px 80px rgba(0,0,0,0.22);
          animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        ">
          <span style="font-size:4rem;display:block;margin-bottom:12px">🎉</span>
          <div style="font-size:1.6rem;font-weight:900;margin-bottom:8px">Parabéns!</div>
          <div style="font-size:1rem;color:#7A6B93;font-weight:600;margin-bottom:20px">
            Você conversou com a IA! ⭐⭐⭐
          </div>
          <div style="display:flex;gap:12px;justify-content:center">
            <button onclick="window.location.href='../index.html'" style="
              background:#C3B1E1;color:white;border:none;border-radius:50px;
              padding:12px 24px;font-family:'Nunito',sans-serif;font-size:0.95rem;
              font-weight:800;cursor:pointer;
            ">Voltar ao Menu</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    sendBtn.addEventListener('click', () => {
      sendMessage(msgInput.value);
    });

    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage(msgInput.value);
      }
    });

    quickBtns.addEventListener('click', (e) => {
      const btn = e.target.closest('.quick-btn');
      if (!btn) return;
      msgInput.value = btn.dataset.text;
      sendMessage(btn.dataset.text);
    });

    updateCounter();
  </script>
</body>
</html>
